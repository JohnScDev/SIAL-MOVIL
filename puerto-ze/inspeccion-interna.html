<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="../assets/brand/isotipo-sial.svg">
  <link rel="apple-touch-icon" href="../assets/brand/isotipo-sial.svg">
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#005CA8">
  <title>SIAL Movil - Inspeccion interna ZE</title>
  <script>(function(){var s=localStorage.getItem("sial-mobile-theme");document.documentElement.dataset.theme=s||"light";})();</script>
  <link rel="stylesheet" href="../shared/sial-mobile-core.css">
</head>
<body>
  <main class="sial-page">
    <header class="sial-page-header">
      <a class="sial-btn sial-btn-icon" href="../app/home.html" aria-label="Volver"><svg class="sial-icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></a>
      <span class="sial-app-isotype" aria-hidden="true"><img src="../assets/brand/isotipo-sial.svg" alt=""></span>
      <div class="sial-page-title"><h1>Inspeccion interna</h1><p>15 a 23 fotos obligatorias</p></div>
      <button class="sial-btn sial-btn-icon" type="button" data-theme-toggle aria-label="Cambiar tema"><svg class="sial-icon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"/></svg></button>
    </header>
    <section class="sial-page-body">
      <div class="sial-status warning" data-requires="zeReception"><span><strong>Evento requerido</strong>Completa primero: <span data-missing-list></span>.</span></div>
      <section class="sial-stat-row">
        <div class="sial-stat"><strong data-flow-photo-count="ze-int-paredes,ze-int-piso,ze-int-techo,ze-int-cableado">0</strong><span>Fotos registradas</span></div>
        <div class="sial-stat"><strong>15-23</strong><span>Rango requerido</span></div>
      </section>

      <form class="sial-card sial-card-pad sial-form" data-flow-form data-event="portInternalInspection" data-detail="Inspeccion interna ZE" data-next="despacho-finca.html" data-required-photos="ze-int-paredes,ze-int-piso,ze-int-techo,ze-int-cableado" data-photo-keys="ze-int-paredes,ze-int-piso,ze-int-techo,ze-int-cableado" data-photo-total-min="15" data-photo-total-max="23" data-prevent-duplicate="true">
        <div class="sial-evidence-grid">
          <button class="sial-evidence-slot" type="button" data-add-photo="ze-int-paredes">Paredes internas</button>
          <button class="sial-evidence-slot" type="button" data-add-photo="ze-int-piso">Piso</button>
          <button class="sial-evidence-slot" type="button" data-add-photo="ze-int-techo">Techo</button>
          <button class="sial-evidence-slot" type="button" data-add-photo="ze-int-cableado">Cableado</button>
        </div>
        <div class="sial-field"><label class="sial-label">Resultado</label><select class="sial-select" name="resultado" required><option>Aprobado</option><option>Rechazado</option></select></div>
        <div class="sial-field"><label class="sial-label">Observaciones</label><textarea class="sial-textarea" name="observaciones" placeholder="Contaminantes, modificaciones, olores o cableado intervenido"></textarea></div>
        <p class="sial-inline-error" data-flow-error hidden></p>
        <button class="sial-btn sial-btn-primary sial-btn-full" type="submit">Guardar inspeccion</button>
      </form>

      <section class="sial-section"><h2 class="sial-section-title">Alertas</h2><div data-flow-alerts></div></section>
    </section>
  </main>
  <script src="../shared/sial-mobile-core.js"></script>
  <script src="../shared/sial-mobile-flow.js"></script>
</body>
</html>
