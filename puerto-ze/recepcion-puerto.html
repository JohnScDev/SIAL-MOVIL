<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="../assets/brand/isotipo-sial.svg">
  <link rel="apple-touch-icon" href="../assets/brand/isotipo-sial.svg">
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#005CA8">
  <title>SIAL Movil - Recepcion en puerto</title>
  <script>(function(){var s=localStorage.getItem("sial-mobile-theme");document.documentElement.dataset.theme=s||"light";})();</script>
  <link rel="stylesheet" href="../shared/sial-mobile-core.css">
</head>
<body>
  <main class="sial-page">
    <header class="sial-page-header">
      <a class="sial-btn sial-btn-icon" href="../app/home.html" aria-label="Volver"><svg class="sial-icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></a>
      <span class="sial-app-isotype" aria-hidden="true"><img src="../assets/brand/isotipo-sial.svg" alt=""></span>
      <div class="sial-page-title"><h1>Recepcion puerto</h1><p>Confirmacion previa a entrega final</p></div>
      <button class="sial-btn sial-btn-icon" type="button" data-theme-toggle aria-label="Cambiar tema"><svg class="sial-icon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"/></svg></button>
    </header>
    <section class="sial-page-body">
      <div class="sial-status warning" data-requires="portDispatch"><span><strong>Evento requerido</strong>Completa primero: <span data-missing-list></span>.</span></div>
      <div class="sial-flow-banner"><strong>Contenedor <span data-flow-container></span></strong><span>Operacion <span data-flow-operation></span> - Vehiculo <span data-flow-vehicle></span></span></div>
      <form class="sial-card sial-card-pad sial-form" data-flow-form data-event="portReception" data-status="RECIBIDO_EN_PUERTO" data-location="PUERTO" data-has-active-dispatch="false" data-detail="Contenedor recibido en puerto" data-next="entrega-puerto.html" data-assert-container-status-any="DESPACHADO_A_PUERTO" data-assert-container-location="TRANSITO_PUERTO" data-prevent-duplicate="true">
        <div class="sial-field"><label class="sial-label">Terminal / puerto</label><select class="sial-select" name="terminal" required><option>Puerto Norte</option><option>Terminal Logistica</option></select></div>
        <div class="sial-field"><label class="sial-label">Fecha y hora llegada</label><input class="sial-input-wrap sial-input" name="fechaLlegada" type="datetime-local" required value="2026-05-05T17:25"></div>
        <div class="sial-field"><label class="sial-label">Validacion de sellos</label><select class="sial-select" name="sellos" required><option>Sellos coinciden</option><option>Sellos con novedad</option></select></div>
        <div class="sial-field"><label class="sial-label">Operacion asociada</label><input class="sial-input-wrap sial-input" name="operacion" required value="EXP-2026-0418"></div>
        <div class="sial-field"><label class="sial-label">Usuario que registra</label><input class="sial-input-wrap sial-input" name="usuario" required value="Maria Operadora"></div>
        <div class="sial-field"><label class="sial-label">Observaciones de llegada</label><textarea class="sial-textarea" name="observaciones" placeholder="Novedades de llegada, espera o validacion documental"></textarea></div>
        <p class="sial-inline-error" data-flow-error hidden></p>
        <button class="sial-btn sial-btn-primary sial-btn-full" type="submit">Registrar recepcion</button>
      </form>
      <section class="sial-section"><h2 class="sial-section-title">Trazabilidad</h2><div class="sial-timeline" data-flow-timeline></div></section>
    </section>
  </main>
  <script src="../shared/sial-mobile-core.js"></script>
  <script src="../shared/sial-mobile-flow.js"></script>
</body>
</html>
