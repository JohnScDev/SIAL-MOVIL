<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SIAL Movil - Despacho a puerto</title>
  <script>(function(){var s=localStorage.getItem("sial-mobile-theme");document.documentElement.dataset.theme=s||"light";})();</script>
  <link rel="stylesheet" href="../shared/sial-mobile-core.css">
</head>
<body>
  <main class="sial-page">
    <header class="sial-page-header">
      <a class="sial-btn sial-btn-icon" href="../app/home.html" aria-label="Volver"><svg class="sial-icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></a>
      <div class="sial-page-title"><h1>Despacho puerto</h1><p>Salida desde ZE hacia terminal</p></div>
      <button class="sial-btn sial-btn-icon" type="button" data-theme-toggle aria-label="Cambiar tema"><svg class="sial-icon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"/></svg></button>
    </header>
    <section class="sial-page-body">
      <div class="sial-status warning" data-requires="zeReturnReception"><span><strong>Evento requerido</strong>Completa primero: <span data-missing-list></span>.</span></div>
      <form class="sial-card sial-card-pad sial-form" data-flow-form data-event="portDispatch" data-status="DESPACHADO_A_PUERTO" data-location="TRANSITO_PUERTO" data-has-active-dispatch="true" data-detail="Contenedor despachado desde ZE hacia puerto" data-next="recepcion-puerto.html" data-assert-container-status-any="RECIBIDO_EN_ZE" data-assert-container-location="ZE" data-assert-no-active-dispatch="true" data-prevent-duplicate="true">
        <div class="sial-field"><label class="sial-label">Contenedor</label><input class="sial-input-wrap sial-input" name="contenedor" required value="SIALU1234567"></div>
        <div class="sial-field"><label class="sial-label">Placa vehiculo</label><input class="sial-input-wrap sial-input" name="placa" required value="TUL458"></div>
        <div class="sial-field"><label class="sial-label">Conductor</label><input class="sial-input-wrap sial-input" name="conductor" required value="Carlos Mendoza"></div>
        <div class="sial-field"><label class="sial-label">Puerto / terminal destino</label><select class="sial-select" name="terminal" required><option>Puerto Norte</option><option>Terminal Logistica</option></select></div>
        <div class="sial-field"><label class="sial-label">Operacion asociada</label><input class="sial-input-wrap sial-input" name="operacion" required value="EXP-2026-0418"></div>
        <div class="sial-field"><label class="sial-label">Fecha y hora despacho</label><input class="sial-input-wrap sial-input" name="fechaDespacho" type="datetime-local" required value="2026-05-05T16:40"></div>
        <div class="sial-field"><label class="sial-label">Usuario que registra</label><input class="sial-input-wrap sial-input" name="usuario" required value="Maria Operadora"></div>
        <div class="sial-field"><label class="sial-label">Observaciones</label><textarea class="sial-textarea" name="observaciones" placeholder="Novedades de despacho a puerto"></textarea></div>
        <p class="sial-inline-error" data-flow-error hidden></p>
        <button class="sial-btn sial-btn-primary sial-btn-full" type="submit">Registrar despacho</button>
      </form>
    </section>
  </main>
  <script src="../shared/sial-mobile-core.js"></script>
  <script src="../shared/sial-mobile-flow.js"></script>
</body>
</html>
