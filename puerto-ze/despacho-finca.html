<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SIAL Movil - Despacho a finca</title>
  <script>(function(){var s=localStorage.getItem("sial-mobile-theme");document.documentElement.dataset.theme=s||"light";})();</script>
  <link rel="stylesheet" href="../shared/sial-mobile-core.css">
</head>
<body>
  <main class="sial-page">
    <header class="sial-page-header">
      <a class="sial-btn sial-btn-icon" href="../app/home.html" aria-label="Volver"><svg class="sial-icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></a>
      <div class="sial-page-title"><h1>Despacho a finca</h1><p>Salida desde ZE hacia finca asignada</p></div>
      <button class="sial-btn sial-btn-icon" type="button" data-theme-toggle aria-label="Cambiar tema"><svg class="sial-icon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"/></svg></button>
    </header>
    <section class="sial-page-body">
      <div class="sial-status warning" data-requires="zeReception"><span><strong>Evento requerido</strong>Completa primero: <span data-missing-list></span>.</span></div>
      <section class="sial-card sial-card-pad sial-form">
        <div class="sial-list-row"><strong>Estado requerido</strong><span>DISPONIBLE o LISTO_PARA_DESPACHO</span></div>
        <div class="sial-list-row"><strong>Estado actual</strong><span data-flow-container-status></span></div>
        <div class="sial-list-row"><strong>Ubicacion actual</strong><span data-flow-location></span></div>
      </section>

      <form class="sial-card sial-card-pad sial-form" data-flow-form data-event="zeDispatch" data-status="EN_TRANSITO_A_FINCA" data-location="TRANSITO_FINCA" data-has-active-dispatch="true" data-detail="Contenedor despachado hacia finca" data-next="../finca/recepcion-finca.html" data-assert-container-exists="true" data-assert-container-location="ZE" data-assert-container-status-any="DISPONIBLE,LISTO_PARA_DESPACHO" data-assert-no-active-dispatch="true" data-prevent-duplicate="true">
        <div class="sial-field"><label class="sial-label">Numero de contenedor</label><input class="sial-input-wrap sial-input" name="contenedor" required value="SIALU1234567"></div>
        <div class="sial-field"><label class="sial-label">Placa del vehiculo</label><input class="sial-input-wrap sial-input" name="placa" required value="TUL458"></div>
        <div class="sial-field"><label class="sial-label">Conductor asignado</label><input class="sial-input-wrap sial-input" name="conductor" required value="Carlos Mendoza"></div>
        <div class="sial-field"><label class="sial-label">Finca destino</label><select class="sial-select" name="finca" required><option>Finca Santa Isabel</option><option>Finca La Esperanza</option></select></div>
        <div class="sial-field"><label class="sial-label">Operacion asociada</label><input class="sial-input-wrap sial-input" name="operacion" required value="EXP-2026-0418"></div>
        <div class="sial-field"><label class="sial-label">Fecha y hora de despacho</label><input class="sial-input-wrap sial-input" name="fechaDespacho" type="datetime-local" required value="2026-05-05T09:20"></div>
        <div class="sial-field"><label class="sial-label">Usuario que registra</label><input class="sial-input-wrap sial-input" name="usuario" required value="Maria Operadora"></div>
        <div class="sial-field"><label class="sial-label">Observaciones logisticas</label><textarea class="sial-textarea" name="observaciones" placeholder="Novedades del despacho"></textarea></div>
        <p class="sial-inline-error" data-flow-error hidden></p>
        <button class="sial-btn sial-btn-primary sial-btn-full" type="submit">Registrar despacho</button>
      </form>
    </section>
  </main>
  <script src="../shared/sial-mobile-core.js"></script>
  <script src="../shared/sial-mobile-flow.js"></script>
</body>
</html>
