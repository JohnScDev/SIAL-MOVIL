<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="../assets/brand/isotipo-sial.svg">
  <link rel="apple-touch-icon" href="../assets/brand/isotipo-sial.svg">
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#005CA8">
  <title>SIAL Movil - Cierre de contenedor</title>
  <script>(function(){var s=localStorage.getItem("sial-mobile-theme");document.documentElement.dataset.theme=s||"light";})();</script>
  <link rel="stylesheet" href="../shared/sial-mobile-core.css">
</head>
<body>
  <main class="sial-page">
    <header class="sial-page-header">
      <a class="sial-btn sial-btn-icon" href="../app/home.html" aria-label="Volver"><svg class="sial-icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></a>
      <span class="sial-app-isotype" aria-hidden="true"><img src="../assets/brand/isotipo-sial.svg" alt=""></span>
      <div class="sial-page-title"><h1>Cierre contenedor</h1><p>Sellos, pallets y evidencia final</p></div>
      <button class="sial-btn sial-btn-icon" type="button" data-theme-toggle aria-label="Cambiar tema"><svg class="sial-icon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"/></svg></button>
    </header>
    <section class="sial-page-body">
      <div class="sial-status warning" data-requires="palletsLoaded"><span><strong>Evento requerido</strong>Completa primero: <span data-missing-list></span>.</span></div>
      <section class="sial-stat-row">
        <div class="sial-stat"><strong data-flow-loaded-pallets>0</strong><span>Pallets cargados</span></div>
        <div class="sial-stat"><strong data-flow-container-status></strong><span>Estado</span></div>
      </section>

      <form class="sial-card sial-card-pad sial-form" data-flow-form data-event="containerClosed" data-status="CONTENEDOR_CERRADO" data-location="FINCA" data-detail="Contenedor cerrado en finca" data-next="despacho-ze.html" data-assert-loaded-pallets-min="1" data-required-photos="contenedor-cerrado,sellos" data-prevent-duplicate="true">
        <div class="sial-field"><label class="sial-label">Contenedor a cerrar</label><input class="sial-input-wrap sial-input" name="contenedor" required value="SIALU1234567"></div>
        <div class="sial-field"><label class="sial-label">Referencia y cantidades</label><input class="sial-input-wrap sial-input" name="referencias" required value="BAN-REF-001 / 48 cajas"></div>
        <div class="sial-field"><label class="sial-label">Sello principal</label><input class="sial-input-wrap sial-input" name="selloPrincipal" required placeholder="Sello de seguridad"></div>
        <div class="sial-field"><label class="sial-label">Sello secundario</label><input class="sial-input-wrap sial-input" name="selloSecundario" required placeholder="Sello adicional"></div>
        <div class="sial-field"><label class="sial-label">Condiciones del contenedor</label><select class="sial-select" name="condiciones" required><option>Sin novedades</option><option>Con incidencia</option></select></div>
        <div class="sial-evidence-grid">
          <button class="sial-evidence-slot" type="button" data-add-photo="contenedor-cerrado">Contenedor cerrado</button>
          <button class="sial-evidence-slot" type="button" data-add-photo="sellos">Sellos</button>
        </div>
        <div class="sial-field"><label class="sial-label">Incidencias u observaciones</label><textarea class="sial-textarea" name="observaciones" placeholder="Condiciones, incidencias durante cargue o novedades de cierre"></textarea></div>
        <p class="sial-inline-error" data-flow-error hidden></p>
        <button class="sial-btn sial-btn-primary sial-btn-full" type="submit">Cerrar contenedor</button>
      </form>
    </section>
  </main>
  <script src="../shared/sial-mobile-core.js"></script>
  <script src="../shared/sial-mobile-flow.js"></script>
</body>
</html>
