<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SIAL Movil - Recepcion en finca</title>
  <script>(function(){var s=localStorage.getItem("sial-mobile-theme");document.documentElement.dataset.theme=s||"light";})();</script>
  <link rel="stylesheet" href="../shared/sial-mobile-core.css">
</head>
<body>
  <main class="sial-page">
    <header class="sial-page-header">
      <a class="sial-btn sial-btn-icon" href="../app/home.html" aria-label="Volver"><svg class="sial-icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></a>
      <div class="sial-page-title"><h1>Recepcion finca</h1><p>Confirmacion de llegada desde ZE</p></div>
      <button class="sial-btn sial-btn-icon" type="button" data-theme-toggle aria-label="Cambiar tema"><svg class="sial-icon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"/></svg></button>
    </header>
    <section class="sial-page-body">
      <div class="sial-status warning" data-requires="zeDispatch"><span><strong>Evento requerido</strong>Completa primero: <span data-missing-list></span>.</span></div>
      <div class="sial-flow-banner"><strong>Contenedor <span data-flow-container></span></strong><span>Estado <span data-flow-container-status></span> - Ubicacion <span data-flow-location></span></span></div>

      <form class="sial-card sial-card-pad sial-form" data-flow-form data-event="farmReception" data-status="RECIBIDO_EN_FINCA" data-location="FINCA" data-has-active-dispatch="false" data-detail="Vehiculo recibido en finca" data-next="inspeccion-externa.html" data-assert-container-status-any="EN_TRANSITO_A_FINCA" data-assert-container-location="TRANSITO_FINCA" data-prevent-duplicate="true">
        <div class="sial-field"><label class="sial-label">Tipo de vehiculo</label><select class="sial-select" name="tipoVehiculo" required><option>Contenedor transportado</option><option>Camion</option></select></div>
        <div class="sial-field"><label class="sial-label">Placa del vehiculo</label><input class="sial-input-wrap sial-input" name="placa" required value="TUL458"></div>
        <div class="sial-field"><label class="sial-label">Numero de contenedor</label><input class="sial-input-wrap sial-input" name="contenedor" value="SIALU1234567"></div>
        <div class="sial-field"><label class="sial-label">Conductor</label><input class="sial-input-wrap sial-input" name="conductor" required value="Carlos Mendoza"></div>
        <div class="sial-field"><label class="sial-label">Finca receptora</label><select class="sial-select" name="finca" required><option>Finca Santa Isabel</option><option>Finca La Esperanza</option></select></div>
        <div class="sial-field"><label class="sial-label">Operacion o viaje asociado</label><input class="sial-input-wrap sial-input" name="operacion" required value="EXP-2026-0418"></div>
        <div class="sial-field"><label class="sial-label">Procedencia</label><select class="sial-select" name="procedencia" required><option>Zona Externa</option><option>Otra finca</option><option>Otro punto logistico</option></select></div>
        <div class="sial-field"><label class="sial-label">Fecha y hora de llegada</label><input class="sial-input-wrap sial-input" name="fechaLlegada" type="datetime-local" required value="2026-05-05T11:10"></div>
        <div class="sial-field"><label class="sial-label">Usuario que registra</label><input class="sial-input-wrap sial-input" name="usuario" required value="Maria Operadora"></div>
        <div class="sial-field"><label class="sial-label">Observaciones de ingreso</label><textarea class="sial-textarea" name="observaciones" placeholder="Retrasos, danos visibles o inconsistencias logisticas"></textarea></div>
        <p class="sial-inline-error" data-flow-error hidden></p>
        <button class="sial-btn sial-btn-primary sial-btn-full" type="submit">Registrar recepcion</button>
      </form>
    </section>
  </main>
  <script src="../shared/sial-mobile-core.js"></script>
  <script src="../shared/sial-mobile-flow.js"></script>
</body>
</html>
