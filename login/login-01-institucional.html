<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SIAL Movil - Login institucional</title>
  <script>
    (function () {
      var saved = localStorage.getItem("sial-mobile-theme");
      var theme = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="sial-mobile-login.css">
</head>
<body>
  <div class="phone-stage">
    <main class="sial-app login-screen variant-institutional">
      <button class="sial-btn sial-btn-icon sial-theme-toggle" type="button" data-theme-toggle aria-label="Cambiar tema">
        <svg class="sial-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"/></svg>
      </button>

      <section class="login-content">
        <header class="login-top">
          <div class="sial-brand-lockup">
            <div class="sial-brand-mark">S</div>
            <div>
              <p class="sial-brand-name">SIAL</p>
              <p class="sial-brand-caption">Sistema de Informacion Agrologistico</p>
            </div>
          </div>
        </header>

        <div class="login-main">
          <section class="login-hero" aria-labelledby="login-title">
            <h1 class="login-title" id="login-title">Tu operacion comienza aqui</h1>
            <p class="login-copy">Ingresa con tus credenciales para continuar con los procesos asociados a tu gestion.</p>
          </section>

          <section class="login-panel" aria-label="Formulario de ingreso">
            <form class="login-form" data-login-form data-next="../app/seleccion-finca.html">
              <div class="sial-field">
                <label class="sial-label" for="usuario">Usuario</label>
                <div class="sial-input-wrap">
                  <svg class="sial-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
                  <input class="sial-input" id="usuario" name="usuario" type="text" inputmode="email" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" enterkeyhint="next" placeholder="usuario.sial">
                </div>
              </div>

              <div class="sial-field">
                <label class="sial-label" for="contrasena">Contrasena</label>
                <div class="sial-input-wrap">
                  <svg class="sial-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
                  <input class="sial-input" id="contrasena" name="contrasena" type="password" autocomplete="current-password" autocapitalize="none" autocorrect="off" spellcheck="false" enterkeyhint="done" placeholder="Ingresa tu contrasena">
                  <button class="sial-password-button" type="button" data-password-toggle="#contrasena" aria-label="Mostrar contrasena">
                    <svg class="sial-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>

              <div class="login-meta">
                <button class="login-link" type="button" data-recover-access>Recuperar acceso</button>
              </div>

              <div class="sial-login-actions">
                <button class="sial-btn sial-btn-primary sial-btn-full" type="submit">Ingresar</button>
              </div>

              <div class="sial-status info" data-login-status hidden></div>
            </form>

            <footer class="login-footer">
              <span>SIAL Movil v0.1</span>
              <span class="login-network">Servicio disponible</span>
            </footer>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="../shared/sial-mobile-core.js"></script>
  <script src="sial-mobile-login.js"></script>
</body>
</html>
