<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SIAL Movil - Cargar pallets</title>
  <script>(function(){var s=localStorage.getItem("sial-mobile-theme");document.documentElement.dataset.theme=s||"light";})();</script>
  <link rel="stylesheet" href="../shared/sial-mobile-core.css">
</head>
<body>
  <main class="sial-page">
    <header class="sial-page-header">
      <a class="sial-btn sial-btn-icon" href="../app/home.html" aria-label="Volver"><svg class="sial-icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></a>
      <div class="sial-page-title"><h1>Cargar pallets</h1><p>Asociacion al contenedor</p></div>
      <button class="sial-btn sial-btn-icon" type="button" data-theme-toggle aria-label="Cambiar tema"><svg class="sial-icon" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"/></svg></button>
    </header>
    <section class="sial-page-body">
      <div class="sial-status warning" data-requires="farmReception"><span><strong>Evento requerido</strong>Completa primero: <span data-missing-list></span>.</span></div>
      <section class="sial-stat-row">
        <div class="sial-stat"><strong data-flow-loaded-pallets>0</strong><span>Pallets cargados</span></div>
        <div class="sial-stat"><strong data-flow-container>SIALU1234567</strong><span>Contenedor</span></div>
      </section>
      <form class="sial-card sial-card-pad sial-form" data-flow-form data-event="palletsLoaded" data-detail="Pallet cargado al contenedor">
        <div class="sial-field"><label class="sial-label">Pallet a cargar</label><input class="sial-input-wrap sial-input" name="pallet" required value="PALLET-001"></div>
        <div class="sial-field"><label class="sial-label">Operacion asociada</label><input class="sial-input-wrap sial-input" name="operacion" required value="EXP-2026-0418"></div>
        <div class="sial-field"><label class="sial-label">Contenedor asociado</label><input class="sial-input-wrap sial-input" name="contenedor" required value="SIALU1234567"></div>
        <div class="sial-field"><label class="sial-label">Fecha y hora de registro</label><input class="sial-input-wrap sial-input" name="fechaCarga" type="datetime-local" required value="2026-05-05T12:25"></div>
        <div class="sial-field"><label class="sial-label">Observaciones del cargue</label><textarea class="sial-textarea" name="observaciones" placeholder="Novedades del pallet, posicion o manipulacion"></textarea></div>
        <p class="sial-inline-error" data-flow-error hidden></p>
        <button class="sial-btn sial-btn-primary sial-btn-full" type="submit">Registrar pallet cargado</button>
        <a class="sial-btn sial-btn-secondary sial-btn-full" href="../finca/cierre-contenedor.html">Continuar a cierre</a>
      </form>
    </section>
  </main>
  <script src="../shared/sial-mobile-core.js"></script>
  <script src="../shared/sial-mobile-flow.js"></script>
</body>
</html>
