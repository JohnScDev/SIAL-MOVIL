<!doctype html>
<html lang="es" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SIAL Movil - Seleccion de finca</title>
  <script>
    (function () {
      var saved = localStorage.getItem("sial-mobile-theme");
      var theme = saved || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="../shared/sial-mobile-core.css">
</head>
<body>
  <main class="sial-page">
    <header class="sial-page-header">
      <div class="sial-brand-lockup">
        <div class="sial-brand-mark">S</div>
        <div class="sial-page-title">
          <h1>Selecciona una finca</h1>
          <p>Define el contexto para continuar</p>
        </div>
      </div>
      <button class="sial-btn sial-btn-icon" type="button" data-theme-toggle aria-label="Cambiar tema">
        <svg class="sial-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 7 9 9 0 1 1-9-7Z"/></svg>
      </button>
    </header>

    <section class="sial-page-body">
      <section class="sial-section">
        <h2 class="sial-section-title">Fincas asignadas</h2>
        <p class="sial-section-copy">Elige la finca sobre la que vas a trabajar. Esta seleccion se usara en los procesos de la aplicacion.</p>
      </section>

      <div class="sial-field">
        <label class="sial-label" for="buscar-finca">Buscar finca</label>
        <div class="sial-input-wrap">
          <svg class="sial-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input class="sial-input" id="buscar-finca" type="search" placeholder="Nombre, codigo o zona">
        </div>
      </div>

      <section class="sial-finca-list" aria-label="Listado de fincas asignadas">
        <button class="sial-finca-card" type="button" data-finca-option data-finca-name="Finca Santa Isabel" data-finca-subtitle="Produccion activa" data-finca-logo="SI" data-next="home.html" aria-pressed="false">
          <span class="sial-logo-box">SI</span>
          <span class="sial-finca-info">
            <strong>Finca Santa Isabel</strong>
            <span>Zona Norte - Produccion activa</span>
            <span class="sial-finca-meta">
              <span class="sial-pill">Campo</span>
              <span class="sial-pill">3 tareas</span>
            </span>
          </span>
        </button>

        <button class="sial-finca-card" type="button" data-finca-option data-finca-name="Finca La Esperanza" data-finca-subtitle="Seguimiento operativo" data-finca-logo="LE" data-next="home.html" aria-pressed="false">
          <span class="sial-logo-box">LE</span>
          <span class="sial-finca-info">
            <strong>Finca La Esperanza</strong>
            <span>Zona Centro - Seguimiento operativo</span>
            <span class="sial-finca-meta">
              <span class="sial-pill">Campo</span>
              <span class="sial-pill">1 tarea</span>
            </span>
          </span>
        </button>

        <button class="sial-finca-card" type="button" data-finca-option data-finca-name="Unidad Operativa Puerto" data-finca-subtitle="Control logistico" data-finca-logo="UP" data-next="home.html" aria-pressed="false">
          <span class="sial-logo-box">UP</span>
          <span class="sial-finca-info">
            <strong>Unidad Operativa Puerto</strong>
            <span>Operacion logistica - Control habilitado</span>
            <span class="sial-finca-meta">
              <span class="sial-pill">Operacion</span>
              <span class="sial-pill">2 alertas</span>
            </span>
          </span>
        </button>
      </section>

      <div class="sial-status info">
        <svg class="sial-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01"/><path d="M11 12h1v5h1"/></svg>
        <span><strong>Contexto requerido</strong>La aplicacion no permite operar sin una finca o unidad asignada.</span>
      </div>
    </section>
  </main>

  <script src="../shared/sial-mobile-core.js"></script>
</body>
</html>
